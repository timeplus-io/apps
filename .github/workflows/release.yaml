name: Release registry

# Trigger: push a tag like  registry-v1.0.0
on:
  push:
    tags:
      - 'registry-v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. registry-v1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases + commit index.json

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build all .tpapp packages
        run: |
          for app in apps/*/; do
            name=$(basename "$app")
            [ -f "$app/manifest.yaml" ] || continue
            echo "Building $name..."
            (cd "$app" && zip -r "${name}.tpapp" manifest.yaml \
              $([ -d ddl ] && echo ddl) \
              $([ -d dashboards ] && echo dashboards))
          done

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build registry index
        run: |
          pip install -q pyyaml
          GITHUB_REPO=${{ github.repository }} \
          GITHUB_RELEASE_TAG=${{ steps.tag.outputs.tag }} \
          python3 registry/build.py

      - name: Create GitHub release and upload all artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Registry ${{ steps.tag.outputs.tag }}"
          files: |
            apps/*/*.tpapp
            registry/index.json

      - name: Commit updated index.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json
          git diff --cached --quiet || git commit -m "registry: update index for ${{ steps.tag.outputs.tag }}"
          git push origin HEAD:main
