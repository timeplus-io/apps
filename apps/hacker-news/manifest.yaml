package_format_version: 1
id: io.timeplus.hacker-news
name: Hacker News Live Feed
version: 1.1.0
author: Timeplus
icon: "data:image/svg+xml;base64,"
description: >
  Continuously ingests Hacker News posts and comments via the official Firebase
  API into a Timeplus stream, ready for real-time analysis of trending stories,
  active users, and post-type distributions.
db_name: hn
categories:
  - analytics
  - demo

python_packages:
  - requests>=2.28.0

config:
  - key: stream_ttl_days
    type: integer
    required: false
    default: "7"
    description: Retention period in days for the hn_post stream
  - key: logstore_retention_bytes
    type: string
    required: false
    default: "107374182"
    description: Logstore retention size in bytes for the hn_post stream (default 100 MB)
  - key: logstore_retention_ms
    type: string
    required: false
    default: "300000"
    description: Logstore retention duration in milliseconds for the hn_post stream (default 5 min)
  - key: task_schedule
    type: string
    required: false
    default: "10s"
    description: How often the ingestion task runs (e.g. 10s, 1m, 5m)
  - key: task_timeout
    type: string
    required: false
    default: "30s"
    description: Maximum runtime per task execution before it is aborted (e.g. 30s, 1m)
  - key: lookback
    type: integer
    required: false
    default: "3"
    description: Number of recent items to look back on the first run (before any post is stored)
  - key: fetch_limit
    type: integer
    required: false
    default: "20"
    description: Maximum number of new items to fetch per task execution
  - key: llm_base_url
    type: string
    required: false
    default: "https://api.openai.com/v1"
    description: Base URL of the OpenAI-compatible API used for embeddings and chat
  - key: llm_api_key
    type: string
    required: true
    secret: true
    description: API key for the OpenAI-compatible endpoint
  - key: embedding_model
    type: string
    required: false
    default: "text-embedding-3-small"
    description: Embedding model used to vectorize stories and questions
  - key: chat_model
    type: string
    required: false
    default: "gpt-4o-mini"
    description: Chat model used to answer questions

resources:
  - file: ddl/001_udf_get_hn_posts.sql
    type: udf
    name: get_hn_posts_after_id_with_retry
  - file: ddl/002_hn_post.sql
    type: stream
    name: hn_post
  - file: ddl/003_task_get_hn_post.sql
    type: task
    name: get_hn_post
  - file: ddl/004_udf_embed_text.sql
    type: udf
    name: embed_text
  - file: ddl/005_hn_story.sql
    type: stream
    name: hn_story
  - file: ddl/006_mv_hn_story_embedding.sql
    type: materialized_view
    name: mv_hn_story_embedding
  - file: ddl/007_udf_rag_answer.sql
    type: udf
    name: rag_answer
