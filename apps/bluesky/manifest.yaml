package_format_version: 1
id: io.timeplus.bluesky
name: Bluesky Social Analytics
version: 1.0.0
author: Timeplus
icon: "data:image/svg+xml;base64,"
description: >
  Real-time social media analytics from Bluesky's Jetstream firehose —
  post volume, engagement metrics, language breakdown, top posters,
  and a live activity feed.
db_name: bluesky
categories:
  - analytics
  - social-media

config:
  - key: jetstream_url
    type: string
    required: false
    default: "wss://jetstream2.us-west.bsky.network/subscribe"
    description: Bluesky Jetstream WebSocket endpoint URL
  - key: wanted_collections
    type: list
    required: false
    default: '["app.bsky.feed.post","app.bsky.feed.like","app.bsky.graph.follow","app.bsky.feed.repost"]'
    description: >
      AT Protocol collection NSIDs to subscribe to.
      Examples: app.bsky.feed.post, app.bsky.feed.like, app.bsky.graph.follow, app.bsky.feed.repost

python_packages:
  - websocket-client>=1.4.0

resources:
  - file: ddl/001_bluesky_jetstream.sql
    type: external_stream
    name: bluesky_jetstream
  - file: ddl/002_bluesky_posts.sql
    type: stream
    name: bluesky_posts
  - file: ddl/003_bluesky_activity.sql
    type: stream
    name: bluesky_activity
  - file: ddl/004_mv_posts_extracted.sql
    type: materialized_view
    name: mv_posts_extracted
  - file: ddl/005_mv_activity_extracted.sql
    type: materialized_view
    name: mv_activity_extracted
  - file: ddl/006_bluesky_stats_1m.sql
    type: mutable_stream
    name: bluesky_stats_1m
  - file: ddl/007_mv_stats_1m.sql
    type: materialized_view
    name: mv_stats_1m
  - file: ddl/008_v_post_volume.sql
    type: view
    name: v_post_volume
  - file: ddl/009_v_top_posters.sql
    type: view
    name: v_top_posters
  - file: ddl/010_v_language_breakdown.sql
    type: view
    name: v_language_breakdown
  - file: ddl/011_v_engagement_timeline.sql
    type: view
    name: v_engagement_timeline

dashboards:
  - file: dashboards/bluesky.json
    name: Bluesky Social Analytics
    description: Real-time post volume, engagement, language breakdown, and live feed
