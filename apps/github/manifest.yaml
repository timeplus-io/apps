package_format_version: 1
id: io.timeplus.github
name: GitHub Activity Monitor
version: 1.0.1
author: Timeplus
icon: "data:image/svg+xml;base64,"
description: Real-time GitHub public events pipeline. Streams public events from the GitHub API into Timeplus for live analytics.
db_name: github
categories:
  - analytics
  - devops

config:
  - key: github_token
    type: string
    required: true
    secret: true
    description: GitHub personal access token (PAT) with public_repo scope

python_packages:
  - PyGithub>=2.0.0

resources:
  - file: ddl/001_github_events_stream.sql
    type: external_stream
    name: github_events_stream
  - file: ddl/002_github_events.sql
    type: stream
    name: github_events
  - file: ddl/003_mv_github_events.sql
    type: materialized_view
    name: mv_github_events

dashboards:
  - file: dashboards/main.json
    name: GitHub Events Dashboard
    description: Real-time view of GitHub public events
