package_format_version: 1
id: io.timeplus.alpha-101
name: Realtime Alpha 101
version: 1.0.0
author: Timeplus
description: >
  Streaming demo of WorldQuant Alpha #1 over a synthetic 10-stock random
  market feed. Demonstrates tumble-window bars, lag/lags arrays, and
  cross-sectional rank in Timeplus streaming SQL.
db_name: alpha_101
categories:
  - analytics
  - finance
  - demo

config:
  - key: bucket
    type: choice
    required: false
    default: "1s"
    description: >
      Tumble-window bar interval. Smaller = more real-time but more CPU;
      larger = smoother bars but slower alpha warm-up
      (1s → ~25s, 5s → ~125s, 1m → ~25min).
    options:
      - "1s"
      - "5s"
      - "1m"

resources:
  - file: ddl/001_random_market_data.sql
    type: stream
    name: random_market_data
  - file: ddl/002_market_data.sql
    type: stream
    name: market_data
  - file: ddl/003_mv_market_data.sql
    type: materialized_view
    name: mv_market_data
  - file: ddl/004_v_bars.sql
    type: view
    name: v_bars
  - file: ddl/005_v_features.sql
    type: view
    name: v_features
  - file: ddl/006_v_ts_argmax_5.sql
    type: view
    name: v_ts_argmax_5
  - file: ddl/007_v_alpha_1.sql
    type: view
    name: v_alpha_1

dashboards:
  - file: dashboards/main.json
    name: Realtime Alpha 101
    description: Live prices and Alpha #1 leaderboard for synthetic stocks
